        function calculateStandings(gid){
            const teams = GROUPS[gid], stats={};
            teams.forEach(t=>{ stats[t]={team:t,person:peopleMap[t]||'',gp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}; });
            allGroupGames.filter(g=>g.group===gid).forEach(g=>{ if(g.homeScore!==null && g.awayScore!==null && stats[g.home]&&stats[g.away]){ /* update stats */ } });
            return Object.values(stats).sort((a,b)=>b.pts-a.pts);
        }
        
        function renderGroups(){
            let html=''; Object.keys(GROUPS).forEach(gid=>{ html+=`<div class="group-card"><h3>Group ${gid}</h3><div class="group-games">Group matches appear here. Click any match to edit.</div></div>`; });
            document.getElementById('groupsGrid').innerHTML=html;
        }
        function renderThirdPlace(){ document.getElementById('thirdPlaceContainer').innerHTML=`<div class="third-place-section"><h3>📊 3rd place ranking will appear after group stage</h3></div>`; }
        function renderKnockoutView(){
            let html=''; const rounds=['Round of 32','Round of 16','Quarter-finals','Semi-finals','Third Place','Final'];
            rounds.forEach(rd=>{ const matches=allKoGames.filter(m=>m.round===rd); if(matches.length){ html+=`<div class="ko-round"><h3>${rd}</h3><div class="ko-games">`; matches.forEach(m=>{ const sc=(m.homeScore!==null&&m.awayScore!==null)?`${m.homeScore}-${m.awayScore}`:'pending'; html+=`<div class="ko-game" data-game-id="${m.id}"><span><strong>${m.home}</strong> vs <strong>${m.away}</strong></span><span class="ko-score ${sc==='pending'?'pending':''}">${sc}</span></div>`;}); html+=`</div></div>`; } });
            document.getElementById('knockoutContainer').innerHTML=html;
            document.querySelectorAll('.ko-game').forEach(el=>el.addEventListener('click',()=>openGameModal(el.dataset.gameId)));
        }
        
        function updateBracketTree(){
            const container=document.getElementById('dynamicBracketTree');
            const rounds=['Round of 32','Round of 16','Quarter-finals','Semi-finals','Final','Third Place'];
            let html='';
            rounds.forEach(rnd=>{ const matches=allKoGames.filter(m=>m.round===rnd); if(matches.length){ html+=`<div class="bracket-round-col"><div class="round-label">${rnd}</div><div class="bracket-matches">`; matches.forEach(m=>{ const hasScore=(m.homeScore!==null&&m.awayScore!==null); const scoreText=hasScore?`${m.homeScore} - ${m.awayScore}`:'—'; html+=`<div class="match-card" data-game-id="${m.id}"><div class="match-teams"><span class="team-abbr">${m.home}</span><span class="match-score ${!hasScore?'pending':''}">${scoreText}</span><span class="team-abbr">${m.away}</span></div><div class="match-meta">${m.date.slice(5)}</div></div>`; }); html+=`</div></div>`; } });
            const finalMatch=allKoGames.find(g=>g.round==='Final');
            let champHtml=''; if(finalMatch && finalMatch.homeScore!==null && finalMatch.awayScore!==null){ const champ=finalMatch.homeScore>finalMatch.awayScore?finalMatch.home:finalMatch.away; champHtml=`<div class="bracket-round-col champion-highlight"><div class="round-label">🏆 CHAMPION</div><div class="final-winner">⭐ ${champ} ⭐</div></div>`; } else { champHtml=`<div class="bracket-round-col"><div class="round-label">🏆 CHAMPION</div><div class="final-winner">TBD</div></div>`; }
            container.innerHTML=html+champHtml;
            document.querySelectorAll('.match-card').forEach(el=>el.addEventListener('click',()=>openGameModal(el.dataset.gameId)));
        }
        
        function openGameModal(gameId){
            const game=allKoGames.find(g=>g.id===gameId);
            if(!game) return;
            const modalDiv=document.getElementById('gameModal');
            modalDiv.innerHTML=`<h3>${game.home} vs ${game.away}</h3><div class="score-inputs"><input type="number" id="homeScore" value="${game.homeScore??''}" placeholder="-"><span>—</span><input type="number" id="awayScore" value="${game.awayScore??''}" placeholder="-"></div><div style="display:flex; gap:8px; justify-content:center; margin-top:16px;"><button class="btn btn-save" id="modalSave">Save</button><button class="btn btn-close" id="modalClose">Close</button></div>`;
            document.getElementById('modalOverlay').classList.add('open');
            document.getElementById('modalSave').addEventListener('click',()=>{ let h=parseInt(document.getElementById('homeScore').value); let a=parseInt(document.getElementById('awayScore').value); if(isNaN(h)) h=null; if(isNaN(a)) a=null; game.homeScore=h; game.awayScore=a; update(scoresRef,{[game.id]:{homeScore:h,awayScore:a}}); document.getElementById('modalOverlay').classList.remove('open'); updateBracketTree(); if(document.querySelector('.tab-btn.active')?.dataset.view==='knockout') renderKnockoutView(); });
            document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modalOverlay').classList.remove('open'));
        }
        
        onValue(scoresRef,(snap)=>{ const data=snap.val()||{}; allKoGames.forEach(g=>{ if(data[g.id]){ g.homeScore=data[g.id].homeScore; g.awayScore=data[g.id].awayScore; } }); updateBracketTree(); if(document.querySelector('.tab-btn.active')?.dataset.view==='knockout') renderKnockoutView(); });
        
        let currentView='groups';
        function renderAll(){ if(currentView==='groups') renderGroups(); else if(currentView==='thirdplace') renderThirdPlace(); else if(currentView==='knockout') renderKnockoutView(); updateBracketTree(); }
        document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentView=btn.dataset.view; document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById(`view-${currentView}`).classList.add('active'); renderAll(); }); });
        function renderCalendar(){ const strip=document.getElementById('calendarStrip'); strip.innerHTML=`<div style="padding:8px;">📅 Click bracket matches to edit knockout scores | Group stage matches editable via group cards</div>`; }
        renderCalendar(); renderAll();
        document.getElementById('modalOverlay').addEventListener('click',function(e){ if(e.target===this) this.classList.remove('open'); });
        updateBracketTree();
    </script>
    <div class="legend-section"><h3>👥 Player Legend</h3><div class="legend-grid" id="legendGrid"></div></div>
    <script> const lg=document.getElementById('legendGrid'); lg.innerHTML=Object.entries(playerColors).map(([p,c])=>`<div class="legend-player"><span class="legend-dot" style="background:${c}"></span>${p}</div>`).join(''); </script>
