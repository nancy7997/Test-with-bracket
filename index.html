<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚽ 2026 FIFA World Cup Tracker · Live Sync + Bracket</title>
    <style>
        /* ... (all previous CSS, unchanged) ... */
        /* We'll keep the existing styles and add a few for the SVG overlay */
        .bracket-wrapper {
            position: relative; /* for SVG absolute positioning */
        }
        .bracket-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .bracket-svg line, .bracket-svg path {
            stroke: #a0aec0;
            stroke-width: 2;
            fill: none;
            opacity: 0.6;
        }
        /* rest of styles as before */
    </style>
</head>
<body>
    <!-- header, calendar, tabs, etc. same as before -->
    <div id="globalBracketContainer" class="bracket-wrapper">
        <div class="bracket-header">
            <h2>🏆 WORLD CUP 2026 · KNOCKOUT BRACKET</h2>
            <div class="bracket-note">⚡ Click any match to edit score | Results auto-fill from Round of 32 → Final</div>
        </div>
        <div id="dynamicBracketTree" class="tournament-bracket"></div>
        <svg class="bracket-svg" id="bracketSvg"></svg>
    </div>

    <!-- rest of the page (modals, etc.) -->

    <script type="module">
        // ... (imports and setup as before) ...

        // ----- The main bracket rendering function with connectors -----
        function renderBracket() {
            updateKnockoutTeams();
            propagateKnockoutResults();

            const container = document.getElementById('dynamicBracketTree');
            const svg = document.getElementById('bracketSvg');
            if (!container) return;

            // Build the bracket HTML (same as before)
            const rounds = ['Round of 32', 'Round of 16', 'Quarter-finals', 'Semi-finals', 'Final', 'Third Place'];
            const factors = [1, 2, 4, 8, 16, 16];
            let html = '';
            rounds.forEach((rnd, idx) => {
                const matches = allKoGames.filter(m => m.round === rnd);
                if (matches.length === 0) return;
                const factor = factors[idx];
                html += `<div class="bracket-round-col"><div class="round-label">${rnd}</div><div class="bracket-matches">`;
                matches.forEach(m => {
                    const hasScore = (m.homeScore !== null && m.awayScore !== null);
                    const scoreText = hasScore ? `${m.homeScore} - ${m.awayScore}` : '—';
                    html += `<div class="match-wrapper" style="flex: ${factor};" data-match-id="${m.id}">
                                <div class="match-card" data-game-id="${m.id}">
                                    <div class="match-teams">
                                        <span class="team-abbr">${m.home}</span>
                                        <span class="match-score ${!hasScore ? 'pending' : ''}">${scoreText}</span>
                                        <span class="team-abbr">${m.away}</span>
                                    </div>
                                    <div class="match-meta">${m.date.slice(5)}</div>
                                </div>
                            </div>`;
                });
                html += `</div></div>`;
            });
            // Add champion column
            const finalMatch = allKoGames.find(g => g.round === 'Final');
            let champHtml = '';
            if (finalMatch && finalMatch.homeScore !== null && finalMatch.awayScore !== null) {
                const champ = finalMatch.homeScore > finalMatch.awayScore ? finalMatch.home : finalMatch.away;
                champHtml = `<div class="bracket-round-col champion-highlight" style="flex:0 0 180px;"><div class="round-label">🏆 CHAMPION</div><div class="final-winner">⭐ ${champ} ⭐</div></div>`;
            } else {
                champHtml = `<div class="bracket-round-col" style="flex:0 0 180px;"><div class="round-label">🏆 CHAMPION</div><div class="final-winner">TBD</div></div>`;
            }
            container.innerHTML = html + champHtml;
            // Attach click events
            container.querySelectorAll('.match-card').forEach(el => {
                el.addEventListener('click', (e) => { e.stopPropagation(); openGameModal(el.dataset.gameId); });
            });

            // Draw connectors after DOM update
            requestAnimationFrame(() => drawConnectors());
        }

        // ----- Connector drawing function -----
        function drawConnectors() {
            const container = document.getElementById('dynamicBracketTree');
            const svg = document.getElementById('bracketSvg');
            if (!container || !svg) return;

            // Get the bounding rect of the container relative to the viewport
            const containerRect = container.getBoundingClientRect();

            // Clear SVG
            svg.innerHTML = '';

            // Define the match source mapping (who feeds into whom)
            const sourceMap = {
                'K17': ['K2', 'K5'],
                'K18': ['K1', 'K3'],
                'K19': ['K4', 'K6'],
                'K20': ['K7', 'K8'],
                'K21': ['K9', 'K11'],
                'K22': ['K10', 'K12'],
                'K23': ['K13', 'K15'],
                'K24': ['K14', 'K16'],
                'K25': ['K17', 'K18'],
                'K26': ['K19', 'K20'],
                'K27': ['K21', 'K22'],
                'K28': ['K23', 'K24'],
                'K29': ['K25', 'K26'],
                'K30': ['K27', 'K28'],
                'K32': ['K29', 'K30'],
                'K31': ['K29', 'K30'] // third place uses losers, but we connect both
            };

            // Get all match wrappers
            const wrappers = container.querySelectorAll('.match-wrapper');
            const wrapperMap = {};
            wrappers.forEach(w => {
                const id = w.dataset.matchId;
                if (id) wrapperMap[id] = w;
            });

            // For each target match, find its sources
            Object.keys(sourceMap).forEach(targetId => {
                const targetWrapper = wrapperMap[targetId];
                if (!targetWrapper) return;
                const targetRect = targetWrapper.getBoundingClientRect();
                // Target left center (we want to connect to the left edge of the match card)
                const targetLeft = targetRect.left - containerRect.left + 8; // offset for padding
                const targetCenterY = targetRect.top + targetRect.height / 2 - containerRect.top;

                const sourceIds = sourceMap[targetId];
                const sourceWrappers = sourceIds.map(id => wrapperMap[id]).filter(w => w);
                if (sourceWrappers.length < 2) return;

                // Get centers of the two source matches (right edge)
                const sourceRects = sourceWrappers.map(w => w.getBoundingClientRect());
                const sourceCenters = sourceRects.map(r => {
                    return {
                        x: r.right - containerRect.left - 8,
                        y: r.top + r.height / 2 - containerRect.top
                    };
                });

                // Draw a path: from each source center to a common point (midpoint between them horizontally)
                // then a horizontal line to the target left.
                // Use a bezier or simple polyline.
                const midX = (sourceCenters[0].x + sourceCenters[1].x) / 2;
                const midY = (sourceCenters[0].y + sourceCenters[1].y) / 2;

                // We want a smooth line: from source1 to mid, source2 to mid, then mid to target.
                // Use a single path with multiple segments.
                let pathD = '';
                // From source1 to mid
                pathD += `M ${sourceCenters[0].x} ${sourceCenters[0].y} `;
                pathD += `L ${midX} ${sourceCenters[0].y} `;
                pathD += `L ${midX} ${midY} `;
                // From source2 to mid
                pathD += `M ${sourceCenters[1].x} ${sourceCenters[1].y} `;
                pathD += `L ${midX} ${sourceCenters[1].y} `;
                pathD += `L ${midX} ${midY} `;
                // From mid to target
                pathD += `L ${targetLeft} ${midY} `;
                // Add a small horizontal line at target
                pathD += `L ${targetLeft} ${targetCenterY}`;

                // Create path element
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathD);
                svg.appendChild(path);
            });

            // Also add horizontal lines to connect the two source matches to the vertical line (already done)
        }

        // ----- Observe resize to redraw connectors -----
        function observeResize() {
            const container = document.getElementById('globalBracketContainer');
            if (!container) return;
            const ro = new ResizeObserver(() => {
                drawConnectors();
            });
            ro.observe(container);
            // Also redraw on scroll
            window.addEventListener('scroll', drawConnectors, { passive: true });
        }

        // Call observeResize after initial render
        // We'll call it in the initialization.

        // ----- The rest of the code (sync, render, etc.) unchanged -----
        // ... (all other functions: syncFromFirebase, saveToFirebase, calculateStandings, etc.)

        // In the initialization, after renderCalendar and renderAll, we call observeResize.
        // We also need to call drawConnectors after renderAll.
        // Modify renderAll to call drawConnectors after renderBracket.

        function renderAll() {
            // ... (existing code) ...
            // At the end:
            renderBracket();
            // drawConnectors is called inside renderBracket after DOM update.
        }

        // ... (rest of the script)

        // At the bottom:
        initializeDefaultScores();
        syncFromFirebase();
        renderCalendar();
        renderAll();
        observeResize();
    </script>
</body>
</html>
