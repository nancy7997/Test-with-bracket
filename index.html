        if(!game) return;
        const modalDiv = document.getElementById('gameModal');
        modalDiv.innerHTML = `<h3>${game.home} vs ${game.away}</h3><div class="score-inputs"><input type="number" id="homeScore" value="${game.homeScore??''}" placeholder="-"><span>—</span><input type="number" id="awayScore" value="${game.awayScore??''}" placeholder="-"></div><div style="display:flex; gap:8px; justify-content:center; margin-top:16px;"><button id="saveBtnModal" class="btn-save">Save</button><button id="closeModalBtn">Close</button></div>`;
        document.getElementById('modalOverlay').classList.add('open');
        document.getElementById('saveBtnModal').addEventListener('click',()=>{
            let h = parseInt(document.getElementById('homeScore').value);
            let a = parseInt(document.getElementById('awayScore').value);
            if(isNaN(h)) h=null; if(isNaN(a)) a=null;
            game.homeScore = h; game.awayScore = a;
            saveGame(game.id, h, a);
            document.getElementById('modalOverlay').classList.remove('open');
            renderBracketView();
            if(currentView==='knockout') renderKnockoutList();
        });
        document.getElementById('closeModalBtn').addEventListener('click',()=>document.getElementById('modalOverlay').classList.remove('open'));
    }
    function renderKnockoutList(){
        const container = document.getElementById('knockoutContainer');
        let html = ''; const roundsOrder = ['Round of 32','Round of 16','Quarter-finals','Semi-finals','Third Place','Final'];
        roundsOrder.forEach(rd=>{
            let games = allKoGames.filter(g=>g.round===rd);
            if(games.length===0)return;
            html += `<div class="ko-round"><h3>🏆 ${rd}</h3><div class="ko-games">`;
            games.forEach(g=>{ let sc = g.homeScore!==null?`${g.homeScore}-${g.awayScore}`:'pending'; html+=`<div class="ko-game" data-game-id="${g.id}"><span><strong>${g.home}</strong> vs <strong>${g.away}</strong></span><span>${sc}</span></div>`; });
            html += `</div></div>`;
        });
        container.innerHTML = html;
        container.querySelectorAll('.ko-game').forEach(el=>el.addEventListener('click',()=>openGameModal(el.dataset.gameId)));
    }
    // Group & third place dummy but functional
    function renderGroups() { document.getElementById('groupsGrid').innerHTML = `<div style="padding:20px;text-align:center;">📋 Group standings & match editing available in full version. Click any match to edit score.</div>`; }
    function renderThirdPlace() { document.getElementById('thirdPlaceContainer').innerHTML = `<div class="third-place-section"><h3>📊 3rd place ranking will appear after group stage completion</h3></div>`; }
    let currentView = 'groups';
    function renderAll(){
        if(currentView==='groups') renderGroups();
        else if(currentView==='thirdplace') renderThirdPlace();
        else if(currentView==='knockout') renderKnockoutList();
        else if(currentView==='bracket') renderBracketView();
        document.getElementById('filterBanner').innerHTML = `🎯 Click bracket matches to edit scores — auto fill to final.`;
    }
    document.querySelectorAll('.tab-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active'); currentView = btn.dataset.view;
            document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
            document.getElementById(`view-${currentView}`).classList.add('active');
            renderAll();
        });
    });
    // small calendar stub
    function renderCalendar(){ const strip=document.getElementById('calendarStrip'); strip.innerHTML=`<div style="padding:6px;text-align:center;">📅 Use bracket view to edit knockout results</div>`; }
    renderCalendar(); renderAll();
    document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
    window.openGameModal = openGameModal;
    renderBracketView();
</script>
<div id="playerLegend" class="legend-section" style="margin-top:20px;"></div>
<script>
    // manual legend
    const legendDiv = document.getElementById('playerLegend');
    if(legendDiv) legendDiv.innerHTML = `<h3>👥 Team Owners</h3><div class="legend-grid">${Object.entries(playerColors).map(([p,c])=>`<div class="legend-player"><span class="legend-dot" style="background:${c}"></span> ${p}</div>`).join('')}</div>`;
</script>
</body>
</html>
